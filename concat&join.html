<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join and Concat</title>
    <script>

        var a = ["zain", "saim", "ali", "ahmed"]
        var b = ["arham", "rehan", "abu bakar", "hamza"]
        var d = ["zain", "saim", "ali", "ahmed"]
        document.write(a)
        document.write("<br><br>")
        var c = a.concat(b,d)
        document.write(c)
        document.write("<br><br>")

        var g = a.join(" ")
        document.write(g)








    </script>
</head>

</body>
</html>

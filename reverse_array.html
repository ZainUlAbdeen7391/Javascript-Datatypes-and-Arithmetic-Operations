<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sort and Reverse Array</title>
    <script>
        var arr = ["Zain", "Fatima", "Amna", "Saim"]
        
        document.write(arr)
        document.write("<br>")
        arr.reverse()
        document.write(arr)
        document.write("<br>")
        arr.sort()
        document.write(arr)

    </script>
</head>

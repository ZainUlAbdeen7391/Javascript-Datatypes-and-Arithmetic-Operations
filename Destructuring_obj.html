<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destructuring Obj</title>
</head>
<body>

    <script>

        let user = {
            name : "Yahoo Baba",
            age : 25,
            city : "Dehli",
        }

        let {name : n, age : a, city: c} = user;
        console.log(n)
        console.log(a)
        console.log(c)



    </script>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Window Object</title>
</head>
<body>

    <button onclick="openWindow()">Open Window</button>
    <button onclick="closeWindow()">Close Window</button>

    <script>
        var myWindow;
        function openWindow(){
          myWindow = window.open("http://yahoobaba.net","","width = 500px, height = 200px, left = 500px, top = 200px")
        }
        function closeWindow(){
            myWindow.close();
        }
    </script>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM====> Document Object Model</title>

</head>
<body>
    <nav class="block">
        <p class="paragraph">
            Welcome to my Website
        </p>
    </nav>
    <div class="block">
        <h4>Hey There, my name is 
            <span onclick="alert('Hey Johney')" id="username">Zain Ul Abdeen</span></h4>
        <p class="block remove">Here is the code for you</p>
        <pre><code>console.log('hey there')</code></pre>
    </div>

    <button onclick="handleButtonClick()">Click Me</button>

    <script>
        function handleButtonClick(){
            console.log("That Button is clicked");
            alert("Hey i am clicked");
        }
    </script>
</body>
</html>

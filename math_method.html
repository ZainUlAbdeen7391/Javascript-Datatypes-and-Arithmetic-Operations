<head>
    <meta charset="UTF-8">

    <title>Math methods </title>
    <script>


var x = Math.ceil(2.6)
document.write(x + "<br>")


var x = Math.floor(2.6)
document.write(x + "<br>")


var x = Math.round(2.6)
document.write(x + "<br>")


var x = Math.trunc(2.6)
document.write(x + "<br>")


var y = Math.max(2, 3, 45, 76)

document.write(y + "<br>")



var y = Math.min(2, 3, 45, 76)

document.write(y + "<br>")

var y = Math.sqrt(8)

document.write(y + "<br>")


var y = Math.cbrt(8)

document.write(y + "<br>")


var y = Math.pow(8, 3)

document.write(y + "<br>")


var y = Math.random()

document.write(y + "<br>")


var y = Math.floor(Math.random() * 100)+1;

document.write(y + "<br>")



var y = Math.abs(-5.98)

document.write(y + "<br>")


var y = Math.PI

document.write(y + "<br>")



    </script>

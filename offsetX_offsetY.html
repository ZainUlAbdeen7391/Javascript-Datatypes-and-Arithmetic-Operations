<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OffsetX and OffsetY</title>
    <style>
        #box{
            width: 600px;
            height: 400px;
            border: 1px solid black;
            background-color: pink;
            margin: 100px;
        }
    </style>
</head>
<body>
    <h2>JavaScript: offsetX & offsetY</h2>
    <div id="box"></div>

    <script>
        var target = document.querySelector("#box");
        target.addEventListener('click', function(e)
        {
            console.clear();
            var x = e.offsetX;
            var y = e.offsetY
            console.log("Offset-X : " + x);
            console.log("Offset=Y : " + y);
        })
    </script>
    
</body>
</html>

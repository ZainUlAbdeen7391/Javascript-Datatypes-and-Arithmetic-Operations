        ["Amna Asghar", 23, "BS_IT", "Junior Full Stack Developer"]
        ]
        document.write(arr.length)
        document.write("<table border = '1px' cellspacing= '0ox'>")
        for(var i = 0; i<arr.length; i++){
            document.write("<tr>")
            for(var j = 0; j<arr.length; j++){

        }
            document.write("</table>")
        




    </script>

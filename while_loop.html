<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>While Loop</title>
    <script>
        var m = 100;
        document.write("<ul>")
        while(m>=0){
            document.write("<li>"+ m + "  Saim is a beautiful guy" + "</li>");
            m = m - 1;
        }
        document.write("</ul>")

    </script>
</head>
<body>


    
</body>
</html>

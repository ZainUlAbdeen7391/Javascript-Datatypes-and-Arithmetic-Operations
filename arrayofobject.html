<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array of Object</title>
    <script>
        var students = [
            {name: "zain", age: 28},
            {name: "saim", age: 22},
            {name: "amna", age: 23},
        ]
        for (var a = 0; a<=students.length; a++){
            document.write(students[a].name + " " + students[a].age + "<br>")
        }

        document.write(students[0])
    </script>
</head>
<body>
    
</body>
</html>

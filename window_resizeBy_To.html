<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Window Resiza by and to</title>
</head>
<body>

    <button onclick="openWindow()">Open Window</button>
    <button onclick="resizaWindow()">Resiza Window</button>


    <script>
        var myWindow;
        function openWindow(){
          myWindow = window.open("","","width = 200px, height = 200px, left = 100px, top = 100px");
          myWindow.document.write("<p>This is my window</p>");
        }

        function resizaWindow(){
            myWindow.resizeBy(400,400);
        }
    </script>
    
</body>
</html>

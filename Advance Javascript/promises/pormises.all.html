<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise-Advance JS</title>
    <script>
        let promiseCall = function(returnData, message){
           return function(resolve, reject){
                    setTimeout(()=>{
                    console.log(`The ${message} promise has resolved: `)
                    resolve(returnData);
                }, returnData * 100);
            }
        };

        let p1 = new Promise(promiseCall(10, "first"));
        let p2 = new Promise(promiseCall(20, "first"));
        let p3 = new Promise(promiseCall(30, "first"));
        let p4 = new Promise(function(resolve, reject){
             reject("The forth promise has rejected.")
        });
        var total = 0;
        Promise.all([p1,p2,p3, p4]).then((result)=>{
            for(var i in result){
                total +=result[i];
                
            }

            console.log(`Results: ${result}`);
            console.log(`Results: ${total}`);

        }).catch((error)=>{
            console.log(`Error: ${error}`);
        });

    </script>
</head>
<body>
    
</body>
</html>

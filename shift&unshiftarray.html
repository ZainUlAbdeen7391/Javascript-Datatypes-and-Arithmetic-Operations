<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift and Unshift Array</title>
    <script>

        var arr = ["zain", "saim", "ali", "ahmed"]
        document.write(arr)
        document.write("<br><br>")


        arr.shift()
        document.write(arr)
        document.write("<br><br>")

        arr.unshift("Talha")
        document.write(arr)

    </script>
</head>
<body>
    
</body>
</html>

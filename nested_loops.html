<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Loops</title>
    <script>
        for(var i = 1; i<=100; i = i+10){
            for(var j = i; j<i+10; j++){
                document.write(j + " ");
            }
            document.write("<br>");
        }



        for(var a = 5; a>=1; a--){
            for(var b = a; b>=1; b--){
                
                document.write( b + " ")
            }
            document.write("<br>")

        }

        
    </script>
</head>
<body>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        #test{
            height: 150px;
            width: 150px;
            background-color: red;
        }
    </style>
</head>
<body>

    <div id="test"></div>


    <script>
        var a = 0
        var id = setInterval(Anim, 500);
        function Anim(){
            a = a +10;
            if (a == 200){
                clearInterval(id)
            }else{
                var target = document.getElementById("test");
                target.style.width = a + "px"
            }   
        }

    </script>
    
</body>
</html>

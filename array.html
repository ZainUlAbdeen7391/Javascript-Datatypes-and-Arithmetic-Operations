<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
    <script>





        var arr = new Array(3);
        for(var g = 0; g<3; g++){
            arr[g] = prompt("Enter a value: ")
        }
       
        for(var i = 0; i<3; i++){
            document.write("<ul>");
            document.write("<li>" + arr[i] + "</li>");
            document.write("</ul>")

        }
        



    </script>
</head>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Property</title>
    <style>
        #box{
            width: 100px;
            height: 100px;
            background-color: green;
            border: 5px solid red;
        }
    </style>
</head>
<body>
    <h2>JavaScript: Key Properties</h2>
    <div id="box"></div>

<script>
    var left = 0;
    var up = 0;
    document.querySelector("body").addEventListener('keydown', function(e)
    {
        console.clear();
        switch(e.key){
            case "ArrowRight":
            left = left + 5;
            break;

            case "ArrowLeft":
            left = left - 5;
            break;

            case "ArrowDown":
            up = up + 5;
            break;

            case "ArrowUp":
            up = up - 5;
            break;

            default:
            console.log("Others Key Pressed:")
            break;
        }
        console.log("Left : " + left);
        console.log("Up :" + up);

        var target = document.querySelector("#box");
        target.style.marginLeft = left + "px";
        target.style.marginTop = up + "px";
    });

</script>
    
</body>
</html>

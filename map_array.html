<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapping in Array </title>
    <script>
        var arr = [1, 2, 3, 4, 5]

        document.write(arr + "<br>")

        var b = arr.map(test)
        document.write(b)
        function test(a){
            return a * 10;
        }

// this map method works with function.. because it returns a new array with transformation


    </script>
</head>
<body>
    
</body>
</html>
